name: Deploy COP to GitHub Pages

# Publishes the standalone Web COP (site/index.html) to GitHub Pages so the
# demo is viewable on a public URL with no install. The published page is the
# embedded-simulation build: it makes no backend calls (LIVE mode only
# activates when c2-core serves the page and injects window.__CUAS_BACKEND__).
#
# Deploys on every push to main that touches the site, and on demand via
# workflow_dispatch. Public URL: https://azjester.github.io/C-UASC2/

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Creates the Pages site on first run so no manual settings step
          # is needed (requires the repo to allow GitHub Actions deployments).
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
