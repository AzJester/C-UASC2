name: Deploy COP to GitHub Pages

# Publishes the standalone Web COP (site/) to the public URL
#   https://azjester.github.io/C-UASC2/
# by snapshotting the site/ tree onto the gh-pages branch, which GitHub Pages
# serves ("deploy from a branch"). The published page is the embedded-simulation
# build: it makes no backend calls (LIVE mode only activates when c2-core serves
# the page and injects window.__CUAS_BACKEND__).
#
# The gh-pages branch is a deployment artifact: a single parentless commit,
# force-pushed on every deploy. Never develop on it. This model needs only the
# default GITHUB_TOKEN (contents: write) - no Pages admin API calls.
#
# Runs on pushes to main that touch the site (or this workflow), and on demand.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish site/ to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          SITE_TREE=$(git rev-parse "HEAD:site")
          DEPLOY_COMMIT=$(git commit-tree "$SITE_TREE" -m "Deploy Web COP demo site (from ${GITHUB_SHA})")
          git push --force origin "${DEPLOY_COMMIT}:refs/heads/gh-pages"
