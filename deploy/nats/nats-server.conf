# Local-reference broker policy. The credentials are intentionally demo-only;
# non-demo deployments must use TLS/mTLS, an external secret source, and
# deployment-specific workload identities.
port: 4222
http_port: 8222

jetstream {
  store_dir: "/tmp/nats/jetstream"
}

authorization {
  users: [
    {
      user: c2
      password: $NATS_C2_PASSWORD
      permissions: {
        publish: [
          "cuas.sensor.task.>"
          "cuas.engagement.order.>"
          "cuas.engagement.control.>"
          "cuas.audit.>"
        ]
        subscribe: [
          "cuas.track.fused.>"
          "cuas.sensor.status.>"
          "cuas.effector.status.>"
          "cuas.engagement.status.>"
        ]
      }
    }
    {
      user: sim
      password: $NATS_SIM_PASSWORD
      permissions: {
        publish: [
          "cuas.track.fused.>"
          "cuas.sensor.status.>"
          "cuas.effector.status.>"
          "cuas.engagement.status.>"
        ]
        subscribe: [
          "cuas.sensor.task.>"
          "cuas.engagement.order.>"
          "cuas.engagement.control.>"
        ]
      }
    }
  ]
}
